name: PR Slice
description: 在一个 primary Epic 下创建单 PR 结果；独立维护工作需说明 standalone 原因。
title: "[Slice] 系统[/组件]: PR 结果"
labels:
  - type:slice
body:
  - type: markdown
    attributes:
      value: |
        用于可以通过一个 PR 合理关闭的工作。路线图工作只能关联一个 primary parent Epic；跨系统影响使用 Related Epics 或原生 dependencies。独立 bug、维护或一次性验证可以填写 standalone 原因。创建前先查重；创建后加入 Engine Project 并设置 Status、Priority、Size。
  - type: input
    id: primary-epic
    attributes:
      label: Primary Epic / standalone reason
      description: 路线图工作链接唯一 parent Epic；独立维护写 `None` 和不需要 Epic 的原因。不要把 #20 当作兜底父级。
      placeholder: "#123；或 None — 独立 CI 修复，不改变路线图能力"
    validations:
      required: true
  - type: input
    id: related-epics
    attributes:
      label: Related Epics
      description: 可选。列出受影响但不拥有本 Slice 的其他 Epics；不要把它们设置为多个 parents。
      placeholder: "#45、#69"
    validations:
      required: false
  - type: input
    id: primary-system
    attributes:
      label: Primary system / package and component
      description: 填写最终交付结果的唯一 owner；内部 component 只用于定位 target/module。
      placeholder: "packages/systems/rendering-vulkan / rendergraph"
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: 当前分支或 PR
      description: 如果已经存在分支或 PR，在这里填写。
      placeholder: codex/editor-shell-viewport 或 PR URL
    validations:
      required: false
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 用一到两句话说明这个 PR 粒度任务要完成的结果。
      placeholder: 说明这个 Slice 要落地的聚焦改动。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 列出这个 Slice 包含的工作。
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: 不做事项
      description: 列出必须留在这个 Slice 之外的工作。
      placeholder: |
        - 不做 ...
        - 延后 ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 描述证明这个 Slice 完成的证据。
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: validation-gates
    attributes:
      label: 验证门禁
      description: 列出适用的构建、smoke、文档同步和 review 门禁。
      value: |
        - 运行 tools\check-text-encoding.ps1。
        - 如果 tracked code、docs、build、tool、shader 或 workflow 文件变更，运行 tools\check-doc-sync.ps1。
        - 运行 git diff --check。
      placeholder: |
        - 运行 ...
        - 运行 ...
    validations:
      required: true
  - type: textarea
    id: current-evidence
    attributes:
      label: 当前证据
      description: 列出支持这个 Slice 的 commits、files、docs 或 issue comments。
      placeholder: |
        - Commit ...
        - File ...
    validations:
      required: false
  - type: textarea
    id: status-updates
    attributes:
      label: 状态更新约定
      description: Slice 进入 In progress 后，按需用 issue comment 更新进展。
      value: |
        - TL;DR:
        - Since last update:
        - Next:
        - Blocked: None
    validations:
      required: false
  - type: textarea
    id: done-evidence
    attributes:
      label: Done 前完成证据
      description: Issue 移到 Done 前，用 comment 或正文更新这些证据。
      value: |
        - Closing PR / commit:
        - Validation gates run:
        - Docs updated or not needed:
        - Follow-up / blocking issues:
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Project Priority
      description: 加入 Project 后，将 Priority 字段设置为这里选择的值。
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Project Size
      description: 加入 Project 后，将 Size 字段设置为这里选择的值。
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: true
  - type: checkboxes
    id: project-rules
    attributes:
      label: Project 规则
      options:
        - label: 创建这个 Slice 前已经查重。
          required: true
        - label: 这个 Slice 足够小，可以通过一个 PR 完成。
          required: true
        - label: 路线图工作只有一个 primary parent Epic；跨系统关系使用 Related Epics 或原生 dependency。
          required: true
        - label: 如果出现真实前置依赖，会建立 blocked-by 关系，而不是把这个 Slice 扩成无边界任务。
          required: true
