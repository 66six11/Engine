name: 路线图 Epic
description: 为 Engine Project 创建有限、可关闭的系统能力里程碑。
title: "[Epic] 系统: 里程碑结果"
labels:
  - type:epic
body:
  - type: markdown
    attributes:
      value: |
        用于需要多个 PR-sized Slices 才能完成的有限里程碑，不用于永久 package、维护域或内部目录。创建前先查重；创建后加入 Engine Project，并设置 Status、Priority、Size。Estimate、Iteration、Start date、Target date 暂不填写，直到有真实排期。
  - type: input
    id: parent-roadmap
    attributes:
      label: 来源文档
      description: 填写来源计划、路线图章节或上级 GitHub issue。
      placeholder: "docs/planning/editor-development-plan.md、docs/rendergraph/roadmap.md 或 #20"
    validations:
      required: true
  - type: input
    id: primary-system
    attributes:
      label: Primary system / package
      description: 填写唯一交付 owner；可以是目标完整系统 package、engine bootstrap component 或 workflow domain。
      placeholder: "packages/systems/rendering-vulkan、engine/host-runtime 或 area:workflow"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 用一到两句话说明这个阶段要完成的结果。
      placeholder: 说明这个 Epic 要冻结的契约、能力或工程边界。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 列出这个 Epic 包含的工作。
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: 不做事项
      description: 列出不能被塞进这个 Epic 的工作。
      placeholder: |
        - 不做 ...
        - 延后 ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 描述证明这个 Epic 完成的证据。
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: validation-gates
    attributes:
      label: 验证门禁
      description: 列出适用的构建、smoke、文档同步和 review 门禁。
      value: |
        - 运行 tools\check-text-encoding.ps1。
        - 运行 tools\check-doc-sync.ps1。
        - 运行 git diff --check。
      placeholder: |
        - 运行 ...
        - 运行 ...
    validations:
      required: true
  - type: textarea
    id: source-docs
    attributes:
      label: 来源文档列表
      description: 列出权威文件或 issue。
      placeholder: |
        - docs/planning/editor-development-plan.md
        - docs/workflow/review.md
    validations:
      required: true
  - type: textarea
    id: status-updates
    attributes:
      label: 状态更新约定
      description: Epic 进入 In progress 后，按需用 issue comment 更新进展。
      value: |
        - TL;DR:
        - Since last update:
        - Next:
        - Blocked: None
    validations:
      required: false
  - type: textarea
    id: done-evidence
    attributes:
      label: Done 前完成证据
      description: Issue 移到 Done 前，用 comment 或正文更新这些证据。
      value: |
        - Closing PR / commit:
        - Validation gates run:
        - Docs updated or not needed:
        - Follow-up / blocking issues:
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Project Priority
      description: 加入 Project 后，将 Priority 字段设置为这里选择的值。
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Project Size
      description: 加入 Project 后，将 Size 字段设置为这里选择的值。
      options:
        - M
        - L
        - XL
    validations:
      required: true
  - type: checkboxes
    id: project-rules
    attributes:
      label: Project 规则
      options:
        - label: 创建这个 Epic 前已经查重。
          required: true
        - label: 这是有限、可关闭的系统能力里程碑；PR 粒度工作会拆成 [Slice] issue。
          required: true
        - label: 这个 Epic 不是为了映射 package、目录或 target 而创建。
          required: true
        - label: 如果出现前置依赖，会创建 blocking issue，而不是把这个 Epic 扩成无边界任务。
          required: true
